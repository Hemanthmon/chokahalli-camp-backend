services:
  - type: web
    name: chokahalli-camp-backend
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "5432"
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: SEED_ADMIN_NAME
        sync: false
      - key: SEED_ADMIN_PHONE
        sync: false
      - key: REGISTRATION_OPEN
        value: "true"
